services:
  atlas-prom-targets-render:
    image: alpine:3.20
    container_name: atlas-prom-targets-render
    env_file:
      - ./env/.env
      - ./env/.secrets.env
    volumes:
      - ./observe/configs/prometheus/targets-templates:/templates:ro
      - prometheus_targets:/rendered
    entrypoint: []
    command:
      - /bin/sh
      - -euc
      - |
        apk add --no-cache gettext
        rm -rf /rendered/*
        for f in /templates/*.yml; do
          out="/rendered/$$(basename "$$f")"
          envsubst < "$$f" > "$$out"
          echo "Rendered: $$out"
        done
        echo "Done:"
        ls -la /rendered
    restart: "no"

  atlas-prometheus:
    image: prom/prometheus:v2.50.1
    container_name: atlas-prometheus
    restart: unless-stopped
    depends_on:
      atlas-prom-targets-render:
        condition: service_completed_successfully
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observe/configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observe/configs/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_targets:/etc/prometheus/targets:ro
      - prometheus_data:/prometheus
    networks: [atlas-controlplane-network]

  atlas-blackbox-exporter:
    image: prom/blackbox-exporter:v0.28.0
    container_name: atlas-blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    ports:
      - "9115:9115"
    volumes:
      - ./observe/configs/blackbox/config.yml:/etc/blackbox_exporter/config.yml:ro
    networks: [atlas-controlplane-network]

    