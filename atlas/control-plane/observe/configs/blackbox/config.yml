modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      fail_if_ssl: false
      fail_if_not_ssl: false

  http_2xx_auth:
    prober: http
    timeout: 5s
    http:
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
      basic_auth:
        username: "${BASIC_AUTH_USER}"
        password: "${BASIC_AUTH_PASS}"

  tcp_connect:
    prober: tcp
    timeout: 5s

  icmp:
    prober: icmp
    timeout: 5s